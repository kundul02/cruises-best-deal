name: Navimba login

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Login and save cookies
        env:
          NAVIMBA_USER: ${{ secrets.NAVIMBA_USER }}
          NAVIMBA_PASS: ${{ secrets.NAVIMBA_PASS }}
        run: node scripts/navimba-cursor-login.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: navimba-cookies
          path: .navimba-cookies.json
          if-no-files-found: error
